name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iWRT package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev
          sudo apt-get install -y python3 python3-setuptools rsync swig unzip zlib1g-dev file wget
          sudo apt-get install -y ecj fastjar java-propose-classpath libelf-dev python3-dev python3-distutils-extra python3-pyelftools
          sudo apt-get install -y python3.11-full python3.11-distutils rsync qemu-utils
      - name: Update packages
        run: ./scripts/feeds update -a
      - name: Install packages
        run: ./scripts/feeds install -a
      - name: Prepare build environment
        run: |
          cp bpi-r4.config .config
          make defconfig
      - name: Build iWRT package
        run: make V=s -j$(nproc)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iWRT-build
          path: bin/**